name: Daily Database Backup

# This tells GitHub to run the script automatically every day at midnight UTC
on:
  schedule:
    - cron: '0 0 * * *'
  # This allows you to click a button and run the backup manually anytime!
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl SQLAlchemy pg8000 cryptography

    - name: Run Backup Script
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python cloud_backup.py

    - name: Upload Backup File
      uses: actions/upload-artifact@v4
      with:
        name: VidyaSaarthi_Daily_Backup
        # This grabs any Excel file generated by the script
        path: "*.xlsx"
        # GitHub will store the backup for 30 days before deleting it
        retention-days: 30