<div class="col-md-4 mb-4"> <div class="card shadow-sm h-100" style="background-color: #ccdfed; border: none; border-radius: 12px; overflow: hidden;">
        <div class="card-body pb-3 pt-3 d-flex flex-column">
            
            <div class="d-flex justify-content-between align-items-start mb-3">
                <h5 class="card-title fw-bold mb-0" style="color: #cc0000; font-size: 1.3rem;">
                    {{ student.full_name }}
                </h5>
                <div class="text-end" style="white-space: nowrap;">
                    <span class="badge shadow-sm" style="background-color: #cc0000; color: #ffffff; font-size: 0.85em;">
                        {{ student.exam_type }}
                    </span>
                    <span class="badge bg-white text-dark shadow-sm ms-1 border" style="font-size: 0.85em;">
                        👤 {{ student.created_by or 'Unknown' }}
                    </span>
                </div>
            </div>

            <p class="mb-1 text-dark" style="font-size: 0.95rem;"><strong>Aadhaar:</strong> {{ student.aadhaar_no }}</p>
            <p class="mb-3 text-dark" style="font-size: 0.95rem;"><strong>Mobile:</strong> {{ student.mobile_number }}</p>

            <div class="mt-auto">
                <div class="d-flex gap-2">
                    <a href="{{ url_for('view_student', id=student.id) }}" class="btn btn-sm w-100 fw-bold shadow-sm" style="background-color: #f6e89e; color: #333; border: none;">
                        Profile
                    </a>
                    <a href="{{ url_for('edit_student', id=student.id) }}" class="btn btn-warning btn-sm w-100 fw-bold shadow-sm" style="border: none;">
                        Edit
                    </a>
                    <button class="btn btn-sm w-100 fw-bold shadow-sm" style="background-color: #cc0000; color: #ffffff; border: none;">
                        Print
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>
