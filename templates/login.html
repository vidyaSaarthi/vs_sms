{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card-3d text-center p-5">
            <h1 style="color: var(--brand-primary); font-weight: 900; letter-spacing: 1px;" class="mb-2">VidyaSaarthi</h1>
            <p class="text-muted mb-4">Student Management System</p>

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold" style="color: var(--brand-primary);">Username</label>
                    <input type="text" class="form-control" name="username" required autofocus>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold" style="color: var(--brand-primary);">Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <button type="submit" class="btn-3d-primary w-100" style="font-size: 1.1rem; padding: 12px;">Login to Dashboard</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
