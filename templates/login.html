{% extends "layout.html" %}

{% block content %}
<style>
    /* Aesthetic Login CSS */
    .login-container {
        min-height: 75vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 25px 50px rgba(204, 0, 0, 0.08), 0 5px 15px rgba(0,0,0,0.03);
        border: 1px solid rgba(204, 223, 237, 0.6);
        overflow: hidden;
        position: relative;
        z-index: 1;
        transition: transform 0.3s ease;
    }

    .login-card:hover {
        transform: translateY(-5px);
    }

    /* Vibrant 3D Decorative Shapes */
    .shape-1 {
        position: absolute;
        top: -50px;
        right: -50px;
        width: 150px;
        height: 150px;
        background: linear-gradient(135deg, #cc0000 0%, #ff4d4d 100%);
        border-radius: 50%;
        z-index: -1;
        opacity: 0.1;
        filter: blur(2px);
    }

    .shape-2 {
        position: absolute;
        bottom: -30px;
        left: -30px;
        width: 100px;
        height: 100px;
        background: linear-gradient(135deg, #f6e89e 0%, #e6ce53 100%);
        border-radius: 50%;
        z-index: -1;
        opacity: 0.4;
        filter: blur(1px);
    }

    .login-header {
        text-align: center;
        padding: 3rem 2rem 1.5rem 2rem;
    }

    .brand-title {
        color: #cc0000;
        font-weight: 900;
        letter-spacing: 1.5px;
        font-size: 2.5rem;
        text-shadow: 2px 2px 4px rgba(204, 0, 0, 0.15);
        margin-bottom: 0.5rem;
    }

    .system-badge {
        background-color: #ccdfed;
        color: #1b3b5c;
        padding: 6px 16px;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        display: inline-block;
        border: 1px solid #a6cbe6;
    }

    .login-body {
        padding: 1.5rem 3rem 3.5rem 3rem;
    }

    .custom-input-wrapper {
        position: relative;
        margin-bottom: 1.5rem;
    }

    .custom-input-wrapper i {
        position: absolute;
        top: 50%;
        left: 18px;
        transform: translateY(-50%);
        color: #a0b6c7;
        font-size: 1.1rem;
        transition: color 0.3s ease;
    }

    .form-control-custom {
        border-radius: 14px;
        padding: 16px 20px 16px 50px;
        border: 2px solid #ccdfed;
        background-color: #f8fbff;
        font-size: 1rem;
        font-weight: 500;
        color: #333;
        transition: all 0.3s ease;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .form-control-custom:focus {
        border-color: #cc0000;
        background-color: #ffffff;
        box-shadow: 0 0 0 4px rgba(204, 0, 0, 0.1);
        outline: none;
    }

    .form-control-custom:focus + i {
        color: #cc0000;
    }

    .btn-3d-custom {
        background: linear-gradient(135deg, #cc0000 0%, #aa0000 100%);
        color: #ffffff;
        border: none;
        border-radius: 14px;
        padding: 16px;
        font-weight: 800;
        font-size: 1.15rem;
        letter-spacing: 0.5px;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-shadow: 0 8px 20px rgba(204, 0, 0, 0.25), inset 0 2px 0 rgba(255,255,255,0.2);
        position: relative;
        overflow: hidden;
    }

    .btn-3d-custom:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 25px rgba(204, 0, 0, 0.35), inset 0 2px 0 rgba(255,255,255,0.2);
        color: #f6e89e;
    }

    .btn-3d-custom:active {
        transform: translateY(1px);
        box-shadow: 0 4px 10px rgba(204, 0, 0, 0.2), inset 0 2px 0 rgba(255,255,255,0.1);
    }
</style>

<div class="row justify-content-center login-container mt-4 mb-5">
    <div class="col-md-7 col-lg-5 col-xl-4">
        <div class="login-card">
            <div class="shape-1"></div>
            <div class="shape-2"></div>

            <div class="login-header">
                <h1 class="brand-title">VidyaSaarthi</h1>
                <div class="system-badge mt-2">
                    <i class="fas fa-sitemap me-1"></i> Admissions & Counselling ERP
                </div>
            </div>

            <div class="login-body">
                <form method="POST" action="{{ url_for('login') }}">

                    <div class="custom-input-wrapper">
                        <label class="form-label fw-bold mb-2" style="color: #4a6b8c; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Username</label>
                        <div class="position-relative">
                            <input type="text" class="form-control form-control-custom w-100" name="username" placeholder="Enter your portal ID" required autofocus>
                            <i class="fas fa-user"></i>
                        </div>
                    </div>

                    <div class="custom-input-wrapper mb-5">
                        <label class="form-label fw-bold mb-2" style="color: #4a6b8c; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Password</label>
                        <div class="position-relative">
                            <input type="password" class="form-control form-control-custom w-100" name="password" placeholder="••••••••" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-3d-custom w-100">
                        Secure Login <i class="fas fa-arrow-right ms-2"></i>
                    </button>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
