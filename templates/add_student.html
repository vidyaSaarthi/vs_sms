{% extends "layout.html" %}
{% block content %}
<div class="card-3d mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 style="color: var(--brand-primary); margin: 0;">Register New Student</h3>
        <a href="{{ url_for('dashboard') }}" class="btn-3d-primary" style="background: var(--brand-accent-blue); color: var(--brand-primary);">Cancel</a>
    </div>

    <form method="POST" enctype="multipart/form-data">

        <h5 class="mt-4 mb-3" style="color: var(--brand-primary); border-bottom: 2px solid var(--brand-accent-yellow); padding-bottom: 5px;">1. Basic Details</h5>
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label">Full Name *</label><input type="text" class="form-control" name="full_name" required></div>
            <div class="col-md-3"><label class="form-label">Date of Birth *</label><input type="date" class="form-control" name="dob" required></div>
            <div class="col-md-3"><label class="form-label">Gender *</label>
                <select class="form-select" name="gender" required>
                    <option value="Male">Male</option><option value="Female">Female</option>
                </select>
            </div>
            <div class="col-md-3"><label class="form-label">Category *</label>
                <select class="form-select" name="category" required>
                    <option value="General">General</option><option value="OBC">OBC</option><option value="SC">SC</option><option value="ST">ST</option>
                </select>
            </div>
            <div class="col-md-3"><label class="form-label">Aadhaar Number *</label><input type="text" class="form-control" name="aadhaar_no" required></div>
            <div class="col-md-3"><label class="form-label">Mobile Number *</label><input type="text" class="form-control" name="mobile_number" required></div>
            <div class="col-md-3"><label class="form-label">Nationality</label><input type="text" class="form-control" name="nationality" value="Indian"></div>
            <div class="col-md-3"><label class="form-label">Nativity (State)</label><input type="text" class="form-control" name="nativity" value="Haryana"></div>
            <div class="col-md-6"><label class="form-label">Identification Mark</label><input type="text" class="form-control" name="identification_mark"></div>
            <div class="col-md-3"><label class="form-label">Place of Residence</label>
                <select class="form-select" name="place_of_residence">
                    <option value="Urban">Urban</option><option value="Rural">Rural</option>
                </select>
            </div>
        </div>

        <h5 class="mt-4 mb-3" style="color: var(--brand-primary); border-bottom: 2px solid var(--brand-accent-yellow); padding-bottom: 5px;">2. Parent Details</h5>
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label">Father's Name *</label><input type="text" class="form-control" name="father_name" required></div>
            <div class="col-md-3"><label class="form-label">Father Occupation</label><input type="text" class="form-control" name="father_occupation"></div>
            <div class="col-md-3"><label class="form-label">Mother's Name *</label><input type="text" class="form-control" name="mother_name" required></div>
            <div class="col-md-3"><label class="form-label">Mother Occupation</label><input type="text" class="form-control" name="mother_occupation"></div>
        </div>

        <h5 class="mt-4 mb-3" style="color: var(--brand-primary); border-bottom: 2px solid var(--brand-accent-yellow); padding-bottom: 5px;">3. Communication & Address</h5>
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Alternative Mobile No.</label><input type="text" class="form-control" name="alt_mobile_number"></div>
            <div class="col-md-6"><label class="form-label">Email Address</label><input type="email" class="form-control" name="email_address"></div>
            <div class="col-12"><label class="form-label">Present Address (House, Street, PIN, District)</label><textarea class="form-control" name="present_address" rows="2"></textarea></div>
            <div class="col-12"><label class="form-label">Permanent Address</label><textarea class="form-control" name="permanent_address" rows="2"></textarea></div>
        </div>

        <h5 class="mt-4 mb-3" style="color: var(--brand-primary); border-bottom: 2px solid var(--brand-accent-yellow); padding-bottom: 5px;">4. Academic Details</h5>
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label">Class 10th Year</label><input type="number" class="form-control" name="class_10_year"></div>
            <div class="col-md-3"><label class="form-label">Class 12th Year</label><input type="number" class="form-control" name="class_12_year"></div>
            <div class="col-md-3"><label class="form-label">Qualifying Exam</label><input type="text" class="form-control" name="qualifying_exam" value="10+2"></div>
            <div class="col-md-3"><label class="form-label">Board of Study</label><input type="text" class="form-control" name="board_of_study" value="CBSE"></div>
            <div class="col-md-6"><label class="form-label">Class 12th School Name</label><input type="text" class="form-control" name="class_12_school_name"></div>
            <div class="col-md-6"><label class="form-label">12th Roll / APAAR ID</label><input type="text" class="form-control" name="registration_no_apaar_id"></div>
        </div>

        <h5 class="mt-4 mb-3" style="color: var(--brand-primary); border-bottom: 2px solid var(--brand-accent-yellow); padding-bottom: 5px;">5. Document Uploads & Drive Links</h5>
                <p class="text-muted small">Upload a JPG/PNG for the preview, and paste the Google Drive URL for the original PDF.</p>
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Passport Photo</label>
                        <input type="file" class="form-control mb-1" name="photo" accept=".png,.jpg,.jpeg">
                        <input type="url" class="form-control form-control-sm" name="photo_url" placeholder="Google Drive Link (Optional)">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">10th Marksheet</label>
                        <input type="file" class="form-control mb-1" name="10th_marksheet" accept=".pdf,.png,.jpg,.jpeg">
                        <input type="url" class="form-control form-control-sm" name="10th_marksheet_url" placeholder="Paste Google Drive PDF Link">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">12th Marksheet</label>
                        <input type="file" class="form-control mb-1" name="12th_marksheet" accept=".pdf,.png,.jpg,.jpeg">
                        <input type="url" class="form-control form-control-sm" name="12th_marksheet_url" placeholder="Paste Google Drive PDF Link">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Aadhaar Card</label>
                        <input type="file" class="form-control mb-1" name="aadhaar_card" accept=".pdf,.png,.jpg,.jpeg">
                        <input type="url" class="form-control form-control-sm" name="aadhaar_card_url" placeholder="Paste Google Drive PDF Link">
                    </div>
                </div>

        <div class="mt-5 text-center">
            <button type="submit" class="btn-3d-primary btn-lg px-5">Save Complete Student Data</button>
        </div>
    </form>
</div>
{% endblock %}
